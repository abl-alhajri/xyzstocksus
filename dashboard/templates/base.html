<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>{% block title %}XYZStocksUS{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span class="title">XYZStocksUS</span>
    </div>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/sharia">Sharia</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <span id="ts">—</span>
    <span class="sep">·</span>
    <span id="market-pill">—</span>
    <span class="sep">·</span>
    <span id="cost-pill">—</span>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
